name: Daily Ozone Forecast

on:
  schedule:
    - cron: '0 6 * * *'   # 2:00 AM Eastern = 6:00 AM UTC (EDT summer time)
  workflow_dispatch:        # allows you to trigger it manually from GitHub anytime

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pandas openpyxl joblib==1.5.3 scikit-learn==1.6.1 numpy PyGithub

      - name: Run forecast pipeline
        env:
          AIRNOW_API_KEY: ${{ secrets.AIRNOW_API_KEY }}
          GITHUB_TOKEN:   ${{ secrets.FORECAST_GITHUB_TOKEN }}
        run: python run_forecast.py
